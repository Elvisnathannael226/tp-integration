apiVersion: 1

datasources:
  - name: GLPI-MySQL
    uid: glpi-mysql
    type: mysql
    url: mariadb:3306
    database: ${MYSQL_DATABASE}
    user: ${MYSQL_USER}
    secureJsonData:
      password: ${MYSQL_PASSWORD}
    jsonData:
      maxOpenConns: 0
      maxIdleConns: 2
      connMaxLifetime: 14400
    isDefault: false
    editable: true
